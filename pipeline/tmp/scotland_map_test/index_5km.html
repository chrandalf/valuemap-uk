<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Scotland 5km Cell Check</title>
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
  <style>
    html, body, #map { margin:0; padding:0; width:100%; height:100%; }
    .panel { position:absolute; top:8px; left:8px; z-index:2; background:#111c; color:#fff; padding:8px 10px; font:12px/1.4 sans-serif; border-radius:6px; max-width:380px; }
  </style>
</head>
<body>
  <div id="map"></div>
  <div class="panel">Local simulation: latest 5km ALL/ALL cells, minTxCount >= 3, northing >= 550k.</div>
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script>
    const map = new maplibregl.Map({
      container: 'map',
      style: 'https://demotiles.maplibre.org/style.json',
      center: [-3.5, 56.2],
      zoom: 5.2
    });

    map.on('load', async () => {
      const res = await fetch('./cells_5km_scotcheck.geojson');
      const fc = await res.json();

      map.addSource('cells', { type: 'geojson', data: fc });
      map.addLayer({
        id: 'cells-fill',
        type: 'fill',
        source: 'cells',
        paint: {
          'fill-color': ['interpolate', ['linear'], ['get', 'tx_count'], 3, '#bfdbfe', 10, '#60a5fa', 25, '#2563eb'],
          'fill-opacity': 0.58
        }
      });
      map.addLayer({
        id: 'cells-line',
        type: 'line',
        source: 'cells',
        paint: { 'line-color': '#0f172a', 'line-width': 0.4, 'line-opacity': 0.65 }
      });

      const bounds = new maplibregl.LngLatBounds();
      for (const f of fc.features) {
        for (const c of f.geometry.coordinates[0]) bounds.extend(c);
      }
      map.fitBounds(bounds, { padding: 20, duration: 0 });

      const popup = new maplibregl.Popup({ closeButton:false, closeOnClick:false });
      map.on('mousemove', 'cells-fill', (e) => {
        const p = e.features?.[0]?.properties; if (!p) return;
        popup.setLngLat(e.lngLat).setHTML(`gx=${p.gx} gy=${p.gy}<br/>tx_count=${p.tx_count} median=${Number(p.median).toLocaleString()}`).addTo(map);
      });
      map.on('mouseleave', 'cells-fill', () => popup.remove());
    });
  </script>
</body>
</html>
